<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxmeter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
@import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --accent: #00e5ff;
  --accent-rgb: 0, 229, 255;
}
body {
  background-color: #000000;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* 1. Top gradient (inline SVG blob, no external file) */
#top-gradient {
  position: fixed;
  top: -30vh;
  left: 0;
  width: 100vw;
  height: auto;
  display: block;
  z-index: 0;
  pointer-events: none;
}

/* 2. Hero content */
.hero-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding-top: 6vh;
  width: 95%;
  max-width: 1100px;
  margin: 0 auto;
}
.hero-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 2.8rem;
  font-weight: 400;
  color: #ffffff;
  line-height: 1.15;
  margin-bottom: 2.2rem;
  letter-spacing: -0.015em;
  text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
}
.hero-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 1.1rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: #ffffff;
  background-color: #000000;
  border: 1px solid rgba(255, 255, 255, 0.18);
  padding: 1.3rem 2.5rem;
  border-radius: 9999px;
  display: inline-flex;
  align-items: center;
  gap: 0.9rem;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 4px 25px rgba(0, 0, 0, 0.4);
  outline: none;
}
.hero-btn:hover {
  background-color: #ffffff;
  color: #000000;
  border-color: #ffffff;
  transform: translateY(-2px);
  box-shadow: 0 6px 30px rgba(0, 0, 0, 0.3);
}
.hero-btn:active { transform: translateY(0); }

.blinking-dot {
  width: 10px;
  height: 10px;
  background-color: var(--accent);
  border-radius: 50%;
  position: relative;
  display: inline-block;
  animation: pulse-glow 2s infinite ease-in-out;
}
.blinking-dot::after {
  content: '';
  position: absolute;
  top: -5px; left: -5px; right: -5px; bottom: -5px;
  background-color: rgba(var(--accent-rgb), 0.45);
  border-radius: 50%;
  animation: wave-expand 2s infinite ease-in-out;
}
@keyframes pulse-glow {
  0%, 100% { opacity: 0.5; transform: scale(0.85); box-shadow: 0 0 4px rgba(var(--accent-rgb), 0.3); }
  50% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 12px rgba(var(--accent-rgb), 0.9); }
}
@keyframes wave-expand {
  0%   { transform: scale(0.6); opacity: 0.9; }
  100% { transform: scale(2.3); opacity: 0; }
}

/* 3. Footer block */
.footer-container {
  position: fixed;
  top: 50vh;
  left: 20px;
  right: 20px;
  width: calc(100vw - 40px);
  transform: translateY(-50%);
  z-index: 3;
  display: flex;
  flex-direction: column;
}
.footer-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  width: 100%;
  padding: 0 5px;
}
.footer-title {
  font-family: 'General Sans', -apple-system, sans-serif;
  font-size: 1.4rem;
  font-weight: 400;
  color: #ffffff;
  letter-spacing: -0.015em;
  margin: 0;
}
.footer-title.quote { text-transform: none; }
.footer-divider {
  border: none;
  height: 1px;
  background-color: rgba(255, 255, 255, 0.2);
  margin: 1.6rem 0;
  width: 100%;
}
.footer-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  padding: 0 5px;
}
.footer-socials {
  display: flex;
  gap: 1.25rem;
  align-items: center;
  flex: 1;
}
.social-icon {
  color: rgba(255, 255, 255, 0.55);
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
}
.social-icon:hover { color: #ffffff; transform: translateY(-2px); }
.footer-links {
  display: flex;
  gap: 2.8rem;
  justify-content: center;
  align-items: center;
  flex: 2;
}
.footer-link {
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  font-weight: 400;
  color: #ffffff;
  text-decoration: none;
  letter-spacing: 0.03em;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.footer-link:hover { opacity: 0.75; transform: translateY(-1px); }
.footer-copyright {
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.45);
  text-align: right;
  flex: 1;
  letter-spacing: 0.02em;
}

/* 4. Giant wordmark */
.footer-logo-wrap {
  position: fixed;
  bottom: 20px;
  left: 0;
  right: 0;
  width: 100%;
  padding: 0 20px;
  box-sizing: border-box;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 3;
  margin: 0;
}
.footer-logo-text {
  font-family: 'General Sans', -apple-system, sans-serif;
  font-size: 22.5vw;
  font-weight: 400;
  color: #ffffff;
  letter-spacing: -0.03em;
  margin-right: -0.03em;
  transform: translateX(-20px);
  line-height: 0.8;
  margin-top: 0;
  margin-bottom: 0;
  margin-left: 0;
  text-align: center;
  width: 100%;
  pointer-events: none;
  opacity: 0.95;
  text-shadow: none;
  white-space: nowrap;
}

/* 5. Background (procedural canvas dashboard, no external video) */
.video-container {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100vw;
  height: 90vh;
  overflow: hidden;
  z-index: -1;
}
#bg-canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* 6. Custom cursor */
.glass-cursor-card {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 99999;
  pointer-events: none;
  padding: 0.75rem 1.5rem;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 9999px;
  box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.15);
  transform: translate(-50%, -50%) scale(0);
  opacity: 0;
  will-change: transform, opacity;
  transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1),
              background 0.35s cubic-bezier(0.16, 1, 0.3, 1),
              border-color 0.35s cubic-bezier(0.16, 1, 0.3, 1),
              box-shadow 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
.glass-cursor-card.active { opacity: 1; }
.cursor-card-text {
  font-family: 'General Sans', -apple-system, sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--accent);
  text-transform: uppercase;
  white-space: nowrap;
  text-shadow: 0 0 8px rgba(var(--accent-rgb), 0.45);
}
.cursor-card-text .text-white {
  color: #ffffff;
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.25);
}
.cursor-ring-outline {
  position: fixed;
  top: 0;
  left: 0;
  width: 48px;
  height: 48px;
  border: 1.5px solid rgba(255, 255, 255, 0.45);
  border-radius: 50%;
  z-index: 99998;
  pointer-events: none;
  transform: translate(-50%, -50%) scale(0);
  opacity: 0;
  will-change: transform, opacity;
  transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1),
              border-color 0.4s ease;
}
.cursor-ring-outline.active { opacity: 1; }
.cursor-ring-outline.expanded { border-color: rgba(255, 255, 255, 0.15); }

/* reveals */
.hero-title .word-wrapper {
  display: inline-block;
  overflow: hidden;
  vertical-align: bottom;
  padding-bottom: 0.15em;
  margin-bottom: -0.15em;
}
.hero-title .word-inner {
  display: inline-block;
  opacity: 0;
  transform: translateY(105%);
  filter: blur(20px);
  animation: word-reveal-mask 1.3s cubic-bezier(0.05, 0.9, 0.1, 1) forwards;
}
@keyframes word-reveal-mask {
  0%   { opacity: 0; transform: translateY(105%); filter: blur(20px); }
  30%  { opacity: 1; }
  100% { opacity: 1; transform: translateY(0); filter: blur(0); }
}
.footer-logo-text .letter-wrapper {
  display: inline-block;
  overflow: hidden;
  vertical-align: bottom;
  line-height: 0.8;
}
.footer-logo-text .letter-inner {
  display: inline-block;
  opacity: 0;
  transform: translateX(-105%);
  filter: blur(20px);
  animation: letter-reveal-mask 1.2s cubic-bezier(0.05, 0.9, 0.1, 1) forwards;
}
@keyframes letter-reveal-mask {
  0%   { opacity: 0; transform: translateX(-105%); filter: blur(20px); }
  25%  { opacity: 1; }
  100% { opacity: 0.95; transform: translateX(0); filter: blur(0); }
}
</style>
</head>
<body>

<!-- Top gradient: inline SVG blob (self-contained) -->
<svg id="top-gradient" viewBox="0 0 1440 600" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="fade" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="55%" stop-color="#000000" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1440" height="600" fill="url(#fade)"/>
</svg>

<main class="hero-content">
  <h1 class="hero-title">Turn raw events <br> into decisions</h1>
  <button class="hero-btn">
    <span class="btn-text">Start free trial</span>
    <span class="blinking-dot"></span>
  </button>
</main>

<footer class="footer-container">
  <div class="footer-top">
    <h2 class="footer-title">Let's Connect</h2>
    <h2 class="footer-title quote">Measure. Learn. Ship.</h2>
  </div>
  <hr class="footer-divider">
  <div class="footer-bottom">
    <div class="footer-socials">
      <a href="#" aria-label="LinkedIn" class="social-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
      </a>
      <a href="#" aria-label="X" class="social-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l11.733 16h4.267l-11.733 -16z"></path><path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"></path></svg>
      </a>
      <a href="#" aria-label="GitHub" class="social-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
      </a>
    </div>
    <nav class="footer-links">
      <a href="#product" class="footer-link">Product</a>
      <a href="#docs" class="footer-link">Docs</a>
      <a href="#pricing" class="footer-link">Pricing</a>
      <a href="#contact" class="footer-link">Contact</a>
    </nav>
    <div class="footer-copyright">
      © 2026 Fluxmeter
    </div>
  </div>
</footer>

<div class="footer-logo-wrap">
  <h2 class="footer-logo-text">Fluxmeter</h2>
</div>

<div class="video-container">
  <canvas id="bg-canvas"></canvas>
</div>

<div id="cursor-ring" class="cursor-ring-outline"></div>
<div id="glass-card" class="glass-cursor-card">
  <span class="cursor-card-text"><span class="text-white">Say</span> Hello!</span>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    /* ---------- wordmark letter split ---------- */
    const logoText = document.querySelector('.footer-logo-text');
    if (logoText) {
        const text = logoText.textContent.trim();
        logoText.innerHTML = '';
        [...text].forEach((char, index) => {
            const wrapper = document.createElement('span');
            wrapper.className = 'letter-wrapper';
            const inner = document.createElement('span');
            inner.textContent = char === ' ' ? ' ' : char;
            inner.className = 'letter-inner';
            inner.style.animationDelay = `${index * 0.09}s`;
            wrapper.appendChild(inner);
            logoText.appendChild(wrapper);
        });
    }
    /* ---------- headline word split ---------- */
    const heroTitle = document.querySelector('.hero-title');
    if (heroTitle) {
        const text = heroTitle.innerHTML;
        const parts = text.split(/(\s+|<br\s*\/?>)/i);
        heroTitle.innerHTML = '';
        let wordIndex = 0;
        parts.forEach(part => {
            if (part.trim() === '') {
                heroTitle.appendChild(document.createTextNode(' '));
            } else if (part.toLowerCase().startsWith('<br')) {
                heroTitle.appendChild(document.createElement('br'));
            } else {
                const wrapper = document.createElement('span');
                wrapper.className = 'word-wrapper';
                const inner = document.createElement('span');
                inner.className = 'word-inner';
                inner.textContent = part;
                inner.style.animationDelay = `${wordIndex * 0.1}s`;
                wordIndex++;
                wrapper.appendChild(inner);
                heroTitle.appendChild(wrapper);
            }
        });
    }
    /* ---------- custom cursor (LERP physics) ---------- */
    const glassCard = document.getElementById('glass-card');
    const cursorRing = document.getElementById('cursor-ring');
    if (glassCard && cursorRing) {
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let cardX = mouseX, cardY = mouseY;
        let ringX = mouseX, ringY = mouseY;
        let isFirstMove = true;
        let scale = 0, targetScale = 0;
        let isHoveringBtn = false;
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
            if (isFirstMove) {
                cardX = mouseX; cardY = mouseY;
                ringX = mouseX; ringY = mouseY;
                isFirstMove = false;
                glassCard.classList.add('active');
                cursorRing.classList.add('active');
            }
            if (!isHoveringBtn) targetScale = 1;
        });
        document.addEventListener('mouseleave', () => { targetScale = 0; });
        document.addEventListener('mouseenter', () => { if (!isHoveringBtn) targetScale = 1; });
        const heroBtn = document.querySelector('.hero-btn');
        if (heroBtn) {
            heroBtn.addEventListener('mouseenter', () => {
                isHoveringBtn = true; targetScale = 0;
                cursorRing.classList.add('expanded');
            });
            heroBtn.addEventListener('mouseleave', () => {
                isHoveringBtn = false; targetScale = 1;
                cursorRing.classList.remove('expanded');
            });
        }
        const updatePhysics = () => {
            cardX += (mouseX - cardX) * 0.08;
            cardY += (mouseY - cardY) * 0.08;
            ringX = mouseX; ringY = mouseY;
            scale += (targetScale - scale) * 0.15;
            const currentRingScale = cursorRing.classList.contains('expanded') ? 1.6 * scale : scale;
            glassCard.style.transform = `translate3d(${cardX}px, ${cardY}px, 0) translate(-50%, -50%) scale(${scale})`;
            cursorRing.style.transform = `translate3d(${ringX}px, ${ringY}px, 0) translate(-50%, -50%) scale(${currentRingScale})`;
            requestAnimationFrame(updatePhysics);
        };
        updatePhysics();
    }

    /* ---------- procedural analytics background (replaces flower video) ---------- */
    const cv = document.getElementById('bg-canvas');
    const ctx = cv.getContext('2d');
    const ACCENT = '#00e5ff';
    let W, H, dpr;
    function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        W = cv.clientWidth; H = cv.clientHeight;
        cv.width = W * dpr; cv.height = H * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    // Several drifting line-chart series that scroll leftward endlessly.
    const series = [];
    const SERIES = 3;
    for (let s = 0; s < SERIES; s++) {
        const pts = [];
        const n = 60;
        let v = 0.5;
        for (let i = 0; i < n; i++) {
            v += (Math.random() - 0.5) * 0.12;
            v = Math.max(0.08, Math.min(0.92, v));
            pts.push(v);
        }
        series.push({
            pts,
            baseY: 0.45 + s * 0.16,
            amp: 0.22 - s * 0.04,
            opacity: 0.5 - s * 0.13,
            speed: 0.4 + s * 0.15,
            offset: 0
        });
    }

    // Floating data points (bokeh-like) for depth
    const motes = [];
    for (let i = 0; i < 40; i++) {
        motes.push({
            x: Math.random(), y: Math.random(),
            r: 0.5 + Math.random() * 2.2,
            vx: (Math.random() - 0.5) * 0.0004,
            vy: -0.0002 - Math.random() * 0.0006,
            a: 0.1 + Math.random() * 0.4
        });
    }

    let t = 0;
    function draw() {
        t += 0.016;
        ctx.clearRect(0, 0, W, H);

        // subtle moving grid
        ctx.strokeStyle = 'rgba(255,255,255,0.045)';
        ctx.lineWidth = 1;
        const grid = 70;
        const shift = (t * 14) % grid;
        for (let x = -shift; x < W; x += grid) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        }
        for (let y = 0; y < H; y += grid) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }

        // glowing chart lines
        series.forEach((se) => {
            se.offset += se.speed;
            const n = se.pts.length;
            const step = W / (n - 2);
            ctx.beginPath();
            for (let i = 0; i < n; i++) {
                const px = i * step - (se.offset % step);
                const wobble = Math.sin(t * 0.8 + i * 0.5) * 0.015;
                const val = se.pts[(i + Math.floor(se.offset / step)) % n];
                const py = H * (se.baseY) - (val - 0.5) * H * se.amp + wobble * H;
                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.strokeStyle = `rgba(0,229,255,${se.opacity})`;
            ctx.lineWidth = 2;
            ctx.shadowColor = ACCENT;
            ctx.shadowBlur = 14;
            ctx.stroke();
            ctx.shadowBlur = 0;

            // area fill under the line
            ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
            const grad = ctx.createLinearGradient(0, H * (se.baseY - se.amp), 0, H);
            grad.addColorStop(0, `rgba(0,229,255,${se.opacity * 0.18})`);
            grad.addColorStop(1, 'rgba(0,229,255,0)');
            ctx.fillStyle = grad;
            ctx.fill();
        });

        // floating motes
        motes.forEach(m => {
            m.x += m.vx; m.y += m.vy;
            if (m.y < -0.02) { m.y = 1.02; m.x = Math.random(); }
            if (m.x < -0.02) m.x = 1.02; if (m.x > 1.02) m.x = -0.02;
            ctx.beginPath();
            ctx.arc(m.x * W, m.y * H, m.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,229,255,${m.a})`;
            ctx.shadowColor = ACCENT; ctx.shadowBlur = 8;
            ctx.fill();
            ctx.shadowBlur = 0;
        });

        requestAnimationFrame(draw);
    }
    draw();
});
</script>
</body>
</html>
